{% extends "base.html" %}

{% block title %}DataBroker229 - Connexion{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100 px-6 py-12">
  <div class="w-full max-w-md space-y-8">
    
    <!-- Header -->
    <div class="text-center space-y-2">
      <div class="flex justify-center">
        <div class="w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg">
          DB
        </div>
      </div>
      <h1 class="text-3xl font-black text-slate-900">DataBroker229</h1>
      <p class="text-sm text-emerald-600 font-bold">🇧🇯 BÉNIN</p>
    </div>

    <!-- Login Form -->
    <form onsubmit="handleAuthSubmit(event, 'login')" class="bg-white rounded-2xl shadow-xl p-8 space-y-6">
      <h2 class="text-2xl font-black text-slate-900 text-center">Connexion</h2>

      <!-- Phone Input -->
      <div class="space-y-2">
        <label class="block text-sm font-bold text-slate-900 uppercase">Votre numéro WhatsApp (+229)</label>
        <div class="flex gap-2">
          <span class="flex items-center px-4 bg-slate-100 rounded-lg font-bold text-slate-600">+229</span>
          <input 
            type="tel" 
            id="login-phone" 
            placeholder="55256871"
            maxlength="8"
            class="flex-1 px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 font-semibold"
          />
        </div>
      </div>

      <!-- Error Box -->
      <div id="auth-error" class="hidden bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded-lg text-sm"></div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-3 px-4 rounded-lg uppercase tracking-widest transition-all shadow-lg active:scale-95"
      >
        Entrer dans mon espace
      </button>
    </form>

    <!-- Demo Accounts -->
    <div class="bg-white rounded-2xl shadow-lg p-6 space-y-4">
      <h3 class="text-sm font-black text-slate-900 uppercase text-center">Accès d'évaluation de démonstration</h3>
      
      <div class="grid grid-cols-1 gap-3">
        <button onclick="fillAndLogPhone('+22961000001')" class="w-full bg-blue-50 hover:bg-blue-100 border border-blue-300 text-blue-700 font-black py-2 px-4 rounded-lg text-sm transition-all">
          👤 Agent (Koffi)
        </button>
        <button onclick="fillAndLogPhone('+22955000001')" class="w-full bg-purple-50 hover:bg-purple-100 border border-purple-300 text-purple-700 font-black py-2 px-4 rounded-lg text-sm transition-all">
          📊 Client Brand
        </button>
        <button onclick="fillAndLogPhone('+22999999999')" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-2 px-4 rounded-lg text-sm transition-all">
          🛡️ Admin
        </button>
      </div>
    </div>

  </div>
</div>

<script>
function fillAndLogPhone(phone) {
  document.getElementById("login-phone").value = phone.replace("+229", "");
  setTimeout(() => {
    const ev = { preventDefault: () => {} };
    handleAuthSubmit(ev, 'login');
  }, 150);
}

async function handleAuthSubmit(e, type) {
  e.preventDefault();

  const errBox = document.getElementById("auth-error");
  errBox.classList.add("hidden");

  let payload = {};
  let url = "";

  if (type === 'login') {
    const phoneInput = document.getElementById("login-phone");
    if (!phoneInput || !phoneInput.value) {
      if (errBox) {
        errBox.innerText = "Veuillez entrer votre numéro de téléphone.";
        errBox.classList.remove("hidden");
      }
      return;
    }

    const rawPhone = phoneInput.value.trim();
    const formattedPhone = rawPhone.startsWith("+229") ? rawPhone : "+229" + rawPhone;
    
    payload = { phone: formattedPhone };
    url = "/api/connexion";
  }

  try {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (response.ok) {
      // Success - redirect to dashboard
      window.location.href = "/dashboard?role=" + (data.role || "agent");
    } else {
      // Error from API
      if (errBox) {
        errBox.innerText = data.message || "Erreur de connexion. Veuillez réessayer.";
        errBox.classList.remove("hidden");
      }
    }
  } catch (error) {
    console.error("Error:", error);
    if (errBox) {
      errBox.innerText = "Erreur serveur. Veuillez vérifier votre connexion.";
      errBox.classList.remove("hidden");
    }
  }
}
</script>
{% endblock %}
